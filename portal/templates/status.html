<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connected – MadChicken AP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .status-dot {
      display: inline-block;
      width: 10px; height: 10px;
      background: #16a34a;
      border-radius: 50%;
      margin-right: 0.4rem;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; display: flex; align-items: center; }
    .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 1.75rem; }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }
    .info-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.85rem 1rem;
    }
    .info-box .label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }
    .info-box .value {
      font-size: 1rem;
      font-weight: 600;
      color: #0f172a;
      word-break: break-all;
    }
    .info-box .value.mono { font-family: monospace; }

    /* ── Experiment ── */
    .experiment-section {
      border-top: 1px solid #e2e8f0;
      padding-top: 1.5rem;
      margin-bottom: 1.75rem;
    }
    .experiment-section h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 0.75rem;
    }
    #exp-btn {
      width: 100%;
      padding: 0.65rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: background 0.15s;
    }
    #exp-btn:hover:not(:disabled) { background: #1d4ed8; }
    #exp-btn.btn-stop             { background: #dc2626; }
    #exp-btn.btn-stop:hover:not(:disabled) { background: #b91c1c; }
    #exp-btn:disabled { background: #94a3b8; cursor: not-allowed; }

    #exp-status {
      margin-top: 0.85rem;
      font-size: 0.85rem;
      color: #475569;
      min-height: 1.2em;
    }
    #exp-status .phase { font-weight: 600; color: #0f172a; }
    #exp-status .done  { color: #16a34a; font-weight: 600; }
    #exp-status .err   { color: #b91c1c; font-weight: 600; }

    .footer {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
    }
    .footer a { color: #64748b; text-decoration: none; }
    .footer a:hover { color: #2563eb; }
    .footer a.danger:hover { color: #b91c1c; }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="status-dot"></span>Connected</h1>
    <p class="sub">MadChicken AP</p>

    <div class="info-grid">
      <div class="info-box">
        <div class="label">Username</div>
        <div class="value">{{ username }}</div>
      </div>
      <div class="info-box">
        <div class="label">Your IP</div>
        <div class="value mono">{{ ip }}</div>
      </div>
      <div class="info-box">
        <div class="label">QoS Class</div>
        <div class="value">{{ traffic_class }}</div>
      </div>
      <div class="info-box">
        <div class="label">Devices Online</div>
        <div class="value">{{ device_count }}</div>
      </div>
    </div>

    <div class="experiment-section">
      <h2>Traffic Classification Experiment</h2>
      <button id="exp-btn">Start Experiment</button>
      <div id="exp-status"></div>
    </div>

    <div class="footer">
      <a href="http://example.com">Continue browsing →</a>
      <a class="danger" href="/user/logout">Sign out</a>
    </div>
  </div>

  <script src="/static/experiment.js"></script>
</body>
</html>
