<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Submitted</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; color: #0f766e; }
    p  { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5; }
    a {
      display: inline-block;
      background: #2563eb;
      color: white;
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
    }
    a:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📋</div>
    <h1>Registration Submitted</h1>
    <p>Hi <strong>{{ username }}</strong>, your account request has been sent.<br>
    You can sign in once an admin approves your account.</p>
    <a href="/login">Go to Sign In</a>
  </div>
</body>
</html>
