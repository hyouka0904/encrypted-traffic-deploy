<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MadChicken AP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.4rem; }
    .sub { color: #666; font-size: 0.9rem; margin-bottom: 1.75rem; }
    .btn {
      display: block;
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      border: none;
      margin-bottom: 0.75rem;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-outline {
      background: white;
      color: #2563eb;
      border: 1.5px solid #2563eb;
    }
    .btn-outline:hover { background: #eff6ff; }
    .divider { color: #94a3b8; font-size: 0.85rem; margin: 0.25rem 0 1rem; }
    .admin-link {
      display: block;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: #64748b;
      text-decoration: none;
    }
    .admin-link:hover { color: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MadChicken AP</h1>
    <p class="sub">Sign in or register to access the network.</p>
    <a class="btn btn-primary" href="/login">Sign In</a>
    <p class="divider">or</p>
    <a class="btn btn-outline" href="/register">Create Account</a>
    <a class="admin-link" href="/admin/login">Admin login</a>
  </div>
</body>
</html>
