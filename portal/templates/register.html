<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – MadChicken AP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .sub { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.85rem; margin-bottom: 0.25rem; color: #334155; }
    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }
    button:hover { background: #1d4ed8; }
    .error {
      background: #fef2f2;
      color: #b91c1c;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .footer {
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: #64748b;
      text-align: center;
    }
    .footer a { color: #2563eb; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create Account</h1>
    <p class="sub">Your account will be active after admin approval.</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/register">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" required autocomplete="username">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="new-password">
      <button type="submit">Register</button>
    </form>
    <div class="footer">
      Already have an account? <a href="/login">Sign in</a><br>
      <a href="/" style="color:#94a3b8; margin-top:0.5rem; display:inline-block;">← Back</a>
    </div>
  </div>
</body>
</html>
